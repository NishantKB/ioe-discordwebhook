name: Check IOE notices

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_notice_id:
        description: "Optional notice ID to force-send as a test"
        required: false
        default: ""

permissions:
  contents: write   

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FILTER_KEYWORD: ""
          TEST_NOTICE_ID: ${{ inputs.test_notice_id }}
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.name "ioe-notice-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen_notices.json
          git diff --quiet --cached || git commit -m "Update seen notices"
          git push
